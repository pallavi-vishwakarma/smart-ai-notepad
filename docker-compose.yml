version: "3.9"

services:
  # ─── MongoDB ─────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: smart-notepad-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart-notepad
    networks:
      - app-network

  # ─── Backend API ──────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smart-notepad-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/smart-notepad
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 30d
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLIENT_URL: http://localhost:5173
    networks:
      - app-network

  # ─── Frontend ─────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smart-notepad-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
